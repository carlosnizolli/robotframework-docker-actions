name: Melhoria ou novo input
description: Sugerir melhoria na action, novos inputs ou encaminhamento de variáveis
title: "[enhancement] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Descreva a melhoria desejada para a GitHub Action.
        Action: `carlosnizolli/robotframework-docker-actions`

  - type: dropdown
    id: tipo
    attributes:
      label: Tipo de pedido
      options:
        - Novo input da action
        - Encaminhar variável de ambiente ao container
        - Melhoria no script composite (action.yml)
        - Melhoria na documentação (README)
        - Suporte a matrix / paralelismo
        - Compatibilidade com runner / Docker
        - Outro
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivação
      description: Por que isso deveria existir? Qual caso de uso no CI?
    validations:
      required: true

  - type: textarea
    id: usage
    attributes:
      label: Como seria usado
      description: Exemplo de workflow ou input proposto
      render: yaml
      placeholder: |
        - uses: carlosnizolli/robotframework-docker-actions@v1.0.1
          with:
            tests_path: tests
            # novo input ou comportamento sugerido

  - type: textarea
    id: links
    attributes:
      label: Links
      description: Issues relacionadas, docs, repositórios
      placeholder: |
        - https://github.com/carlosnizolli/docker-robotframework/issues/...

  - type: dropdown
    id: priority
    attributes:
      label: Prioridade para você
      options:
        - Nice to have
        - Importante no meu fluxo
        - Bloqueante (não consigo usar a action sem isso)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Verifiquei se já dá para fazer com os inputs atuais (options, listener, image, etc.)
          required: false
        - label: Se envolve a imagem Docker, considere abrir issue em docker-robotframework
          required: false
